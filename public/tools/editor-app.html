<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>WashDog — Instagram Template Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --blue:#2F80ED; --yellow:#F2C94C; --aqua:#BEE9F7;
      --charcoal:#1F2933; --white:#fff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#0f172a; min-height:100vh; }

    /* ── App shell ── */
    .app { display:flex; height:100vh; overflow:hidden; }

    /* Sidebar */
    .sidebar {
      width:280px; background:#1e293b; border-right:1px solid rgba(255,255,255,0.06);
      display:flex; flex-direction:column; padding:24px 20px; gap:24px; overflow-y:auto; flex-shrink:0;
    }
    .sidebar h1 { font-family:'Poppins',sans-serif; color:white; font-size:15px; font-weight:700; }
    .sidebar .brand { color:var(--yellow); font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; }

    .section-title {
      font-size:10px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;
      color:rgba(255,255,255,0.3); margin-bottom:10px;
    }

    /* Template picker */
    .template-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .tmpl-btn {
      background:rgba(255,255,255,0.05); border:1.5px solid rgba(255,255,255,0.08);
      border-radius:10px; padding:10px 8px; cursor:pointer; text-align:center;
      transition:all 0.15s;
    }
    .tmpl-btn:hover { background:rgba(47,128,237,0.15); border-color:rgba(47,128,237,0.4); }
    .tmpl-btn.active { background:rgba(47,128,237,0.2); border-color:var(--blue); }
    .tmpl-btn .icon { font-size:22px; margin-bottom:4px; }
    .tmpl-btn .name { font-size:10px; font-weight:600; color:rgba(255,255,255,0.7); }

    /* Text fields */
    .field { display:flex; flex-direction:column; gap:5px; }
    .field label { font-size:10px; font-weight:700; color:rgba(255,255,255,0.4); letter-spacing:0.1em; text-transform:uppercase; }
    .field input, .field textarea {
      background:rgba(255,255,255,0.05); border:1.5px solid rgba(255,255,255,0.08);
      border-radius:8px; padding:8px 10px; color:white; font-family:'Inter',sans-serif;
      font-size:12px; outline:none; resize:none; transition:border-color 0.15s;
    }
    .field input:focus, .field textarea:focus { border-color:rgba(47,128,237,0.5); }
    .field textarea { min-height:72px; line-height:1.5; }

    /* Export button */
    .export-btn {
      background:var(--yellow); color:var(--charcoal);
      font-family:'Poppins',sans-serif; font-size:13px; font-weight:800;
      padding:12px; border-radius:10px; border:none; cursor:pointer;
      transition:opacity 0.15s; width:100%;
    }
    .export-btn:hover { opacity:0.9; }
    .export-btn:active { opacity:0.8; }

    .hint {
      font-size:10.5px; color:rgba(255,255,255,0.25); line-height:1.5; text-align:center;
    }

    /* ── Canvas area ── */
    .canvas-area {
      flex:1; display:flex; align-items:center; justify-content:center;
      background:#0f172a; overflow:auto; padding:40px;
    }

    /* The actual 1080×1080 post at 50% = 540px */
    .post-wrap {
      position:relative;
      transform-origin:top center;
    }

    /* ── POST TEMPLATES ── */
    .post {
      width:540px; height:540px; position:relative; overflow:hidden;
      display:flex; flex-direction:column;
    }

    /* ─ Tip template ─ */
    .post.tip { background:var(--charcoal); }
    .post.tip .top-bar { height:4px; background:linear-gradient(90deg,var(--blue),var(--aqua),var(--yellow)); flex-shrink:0; }
    .post.tip .inner { flex:1; padding:36px 40px; display:flex; flex-direction:column; position:relative; z-index:1; }
    .post.tip .badge {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(242,201,76,0.12); border:1px solid rgba(242,201,76,0.25);
      color:var(--yellow); font-size:10px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;
      padding:5px 12px; border-radius:100px; margin-bottom:16px; align-self:flex-start;
    }
    .post.tip .bubbles { position:absolute; inset:0; background:radial-gradient(circle at 85% 15%, rgba(190,233,247,0.1) 0%,transparent 50%), radial-gradient(circle at 10% 85%, rgba(47,128,237,0.07) 0%,transparent 40%); pointer-events:none; }
    .post.tip .paw-deco { position:absolute; right:30px; top:50px; opacity:0.05; }
    .post.tip h2 { font-family:'Poppins',sans-serif; font-size:26px; font-weight:800; color:white; line-height:1.2; letter-spacing:-0.015em; flex:1; }
    .post.tip h2 em { color:var(--yellow); font-style:normal; }
    .post.tip .body-text { font-size:13px; color:rgba(255,255,255,0.6); line-height:1.6; margin-top:10px; }
    .post.tip .footer { margin-top:auto; padding-top:14px; border-top:1px solid rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:space-between; }
    .post.tip .brand-tag { font-family:'Poppins',sans-serif; font-size:10px; font-weight:700; color:rgba(255,255,255,0.2); letter-spacing:0.1em; }
    .post.tip .save-tag { background:rgba(47,128,237,0.15); border:1px solid rgba(47,128,237,0.25); color:var(--aqua); font-size:9.5px; font-weight:700; padding:5px 12px; border-radius:100px; }

    /* ─ Park template ─ */
    .post.park { background:#f0faff; }
    .post.park .photo-area {
      height:220px; flex-shrink:0; position:relative; overflow:hidden;
      background:linear-gradient(135deg,#a8d5b5,#7ecbdd);
      display:flex; align-items:center; justify-content:center;
    }
    .post.park .photo-area::before { content:''; position:absolute; top:0;left:0;right:0; height:4px; background:linear-gradient(90deg,var(--blue),var(--aqua),#22c55e); }
    .post.park .photo-area img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
    .post.park .drop-hint { font-size:11px; font-weight:600; color:rgba(255,255,255,0.6); letter-spacing:0.08em; text-transform:uppercase; text-align:center; position:relative; z-index:1; line-height:1.6; }
    .post.park .photo-badge { position:absolute; top:12px; left:12px; background:rgba(255,255,255,0.92); color:#16a34a; font-size:9px; font-weight:700; padding:5px 10px; border-radius:100px; letter-spacing:0.1em; text-transform:uppercase; z-index:2; }
    .post.park .content { flex:1; padding:18px 28px 20px; display:flex; flex-direction:column; }
    .post.park h2 { font-family:'Poppins',sans-serif; font-size:20px; font-weight:800; color:var(--charcoal); line-height:1.2; letter-spacing:-0.01em; margin-bottom:6px; }
    .post.park .meta { font-size:11px; color:rgba(31,41,51,0.45); margin-bottom:8px; }
    .post.park .body-text { font-size:12px; color:rgba(31,41,51,0.6); line-height:1.55; flex:1; }
    .post.park .chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
    .post.park .chip { background:rgba(47,128,237,0.08); color:var(--blue); font-size:9.5px; font-weight:600; padding:4px 10px; border-radius:100px; }
    .post.park .footer { margin-top:auto; padding-top:10px; border-top:1px solid rgba(31,41,51,0.06); display:flex; justify-content:space-between; align-items:center; }
    .post.park .brand-tag { font-family:'Poppins',sans-serif; font-size:10px; font-weight:700; color:rgba(31,41,51,0.2); letter-spacing:0.1em; }
    .post.park .cta-small { font-size:10px; color:var(--blue); font-weight:600; }

    /* ─ Client template ─ */
    .post.client { background:#f8fafc; }
    .post.client .top-grad { height:220px; position:relative; flex-shrink:0; }
    .post.client .top-grad-bg { position:absolute; inset:0; background:linear-gradient(135deg,#2F80ED,#1a5ec8,#BEE9F7); }
    .post.client .photo-ring-wrap { position:absolute; bottom:-52px; left:50%; transform:translateX(-50%); z-index:2; }
    .post.client .photo-ring { width:130px; height:130px; border-radius:50%; padding:4px; background:linear-gradient(135deg,var(--yellow),#f29c4c); }
    .post.client .photo-circle {
      width:100%; height:100%; border-radius:50%;
      background:linear-gradient(135deg,#a8d5b5,#7ecbdd);
      display:flex; align-items:center; justify-content:center;
      border:4px solid white; overflow:hidden; position:relative;
    }
    .post.client .photo-circle img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; border-radius:50%; }
    .post.client .photo-circle .drop-hint { font-size:9px; font-weight:600; color:rgba(255,255,255,0.6); text-align:center; letter-spacing:0.06em; text-transform:uppercase; line-height:1.4; position:relative; z-index:1; }
    .post.client .bubble1 { position:absolute; top:16px; left:16px; width:52px; height:52px; border-radius:50%; border:2px solid rgba(255,255,255,0.12); }
    .post.client .bubble2 { position:absolute; top:30px; right:26px; width:70px; height:70px; border-radius:50%; border:2px solid rgba(255,255,255,0.08); }
    .post.client .content { flex:1; padding:62px 32px 20px; display:flex; flex-direction:column; align-items:center; text-align:center; }
    .post.client .dog-name { font-family:'Poppins',sans-serif; font-size:24px; font-weight:800; color:var(--charcoal); letter-spacing:-0.01em; margin-bottom:2px; }
    .post.client .dog-meta { font-size:11px; color:rgba(31,41,51,0.4); margin-bottom:10px; }
    .post.client .stars { color:var(--yellow); font-size:16px; letter-spacing:2px; margin-bottom:10px; }
    .post.client .quote { font-size:12px; line-height:1.6; color:rgba(31,41,51,0.6); font-style:italic; max-width:340px; }
    .post.client .quote strong { font-style:normal; color:var(--charcoal); }
    .post.client .footer { margin-top:auto; padding:12px 32px 16px; border-top:1px solid rgba(31,41,51,0.06); width:100%; display:flex; justify-content:space-between; }
    .post.client .brand-tag { font-family:'Poppins',sans-serif; font-size:10px; font-weight:700; color:rgba(31,41,51,0.18); letter-spacing:0.1em; }
    .post.client .ig { font-size:10px; color:var(--blue); font-weight:600; }

    /* ─ Service template ─ */
    .post.service { background:var(--blue); }
    .post.service .svg-bubbles { position:absolute; inset:0; pointer-events:none; }
    .post.service .top-bar { height:4px; background:var(--yellow); flex-shrink:0; }
    .post.service .inner { flex:1; padding:32px 36px; display:flex; flex-direction:column; position:relative; z-index:1; }
    .post.service .eyebrow { font-size:9px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.45); margin-bottom:10px; }
    .post.service h2 { font-family:'Poppins',sans-serif; font-size:24px; font-weight:800; color:white; line-height:1.2; letter-spacing:-0.015em; margin-bottom:18px; }
    .post.service h2 em { color:var(--yellow); font-style:normal; }
    .post.service .steps { display:flex; flex-direction:column; gap:10px; flex:1; }
    .post.service .step { display:flex; align-items:flex-start; gap:12px; }
    .post.service .step-num { width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,0.12); border:1.5px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-family:'Poppins',sans-serif; font-size:11px; font-weight:700; color:var(--yellow); flex-shrink:0; }
    .post.service .step-text { font-size:13px; font-weight:500; color:rgba(255,255,255,0.85); line-height:1.4; padding-top:4px; }
    .post.service .step-text small { display:block; font-size:11px; font-weight:400; color:rgba(255,255,255,0.4); margin-top:1px; }
    .post.service .footer { margin-top:auto; padding-top:12px; border-top:1px solid rgba(255,255,255,0.08); display:flex; justify-content:space-between; align-items:center; }
    .post.service .brand-tag { font-family:'Poppins',sans-serif; font-size:10px; font-weight:700; color:rgba(255,255,255,0.2); letter-spacing:0.1em; }
    .post.service .cta-small { font-size:10px; color:rgba(190,233,247,0.7); font-weight:600; }

    /* ── Drop overlay (shown when dragging over photo zone) ── */
    .drop-zone {
      position:relative; cursor:pointer;
    }
    .drop-zone.dragging::after {
      content:'Suelta la foto aquí';
      position:absolute; inset:0; background:rgba(47,128,237,0.7);
      display:flex; align-items:center; justify-content:center;
      color:white; font-size:14px; font-weight:700; letter-spacing:0.08em;
      text-transform:uppercase; z-index:10; border-radius:4px;
    }

    /* ── Export overlay ── */
    #export-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(15,23,42,0.9); z-index:1000;
      align-items:center; justify-content:center; flex-direction:column; gap:16px;
    }
    #export-overlay.show { display:flex; }
    #export-overlay p { color:white; font-size:14px; font-weight:600; }
    #export-overlay .spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,0.15); border-top-color:var(--yellow); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Scrollbar */
    .sidebar::-webkit-scrollbar { width:4px; }
    .sidebar::-webkit-scrollbar-track { background:transparent; }
    .sidebar::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
  </style>
</head>
<body>

<div id="export-overlay">
  <div class="spinner"></div>
  <p>Exportando 1080×1080 PNG...</p>
</div>

<div class="app">

  <!-- ── Sidebar ── -->
  <div class="sidebar">

    <div>
      <div class="brand">WashDog</div>
      <h1>Template Editor</h1>
    </div>

    <div>
      <div class="section-title">Plantilla</div>
      <div class="template-grid">
        <div class="tmpl-btn active" onclick="setTemplate('tip')">
          <div class="icon">💡</div><div class="name">Dog Tip</div>
        </div>
        <div class="tmpl-btn" onclick="setTemplate('park')">
          <div class="icon">🌳</div><div class="name">Parque</div>
        </div>
        <div class="tmpl-btn" onclick="setTemplate('client')">
          <div class="icon">🐶</div><div class="name">Cliente</div>
        </div>
        <div class="tmpl-btn" onclick="setTemplate('service')">
          <div class="icon">🚿</div><div class="name">Servicio</div>
        </div>
      </div>
    </div>

    <div id="fields-container" style="display:flex;flex-direction:column;gap:14px;">
      <!-- Fields injected by JS -->
    </div>

    <button class="export-btn" onclick="exportPost()">
      ⬇ Exportar PNG 1080×1080
    </button>

    <p class="hint">
      Arrastra una foto directamente sobre el área de imagen en la plantilla para agregarla.
    </p>

  </div>

  <!-- ── Canvas ── -->
  <div class="canvas-area">
    <div class="post-wrap" id="post-wrap">
      <!-- Post rendered here by JS -->
    </div>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let currentTemplate = 'tip'
let images = {} // key: zone id → data URL

// ── Templates ──────────────────────────────────────────────────────────────
const templates = {

  tip: {
    fields: [
      { id:'badge', label:'Categoría', type:'input', default:'Tip de la semana' },
      { id:'headline', label:'Titular', type:'input', default:'¿Sabías que el pavimento puede quemar las patas de tu perro?' },
      { id:'highlight', label:'Palabra destacada (en amarillo)', type:'input', default:'quemar las patas' },
      { id:'body', label:'Texto del tip', type:'textarea', default:'En verano el asfalto en Santiago puede superar los 60°C. Si no aguantas la mano 5 segundos, tu perro tampoco debería caminar ahí.' },
      { id:'hashtag', label:'Hashtag', type:'input', default:'#PerrosSantiago #TipCanino' },
    ],
    render(f) {
      const hl = f.highlight || ''
      const headline = (f.headline || '').replace(hl, `<em>${hl}</em>`)
      return `<div class="post tip">
        <div class="bubbles"></div>
        <svg class="paw-deco" width="160" height="160" viewBox="0 0 100 100" fill="white">
          <ellipse cx="50" cy="65" rx="22" ry="18"/><ellipse cx="22" cy="44" rx="9" ry="12"/>
          <ellipse cx="78" cy="44" rx="9" ry="12"/><ellipse cx="35" cy="26" rx="8" ry="10"/>
          <ellipse cx="65" cy="26" rx="8" ry="10"/>
        </svg>
        <div class="top-bar"></div>
        <div class="inner">
          <div class="badge">${f.badge||'Tip'}</div>
          <h2>${headline}</h2>
          <p class="body-text">${(f.body||'').replace(/\n/g,'<br>')}</p>
          <div class="footer">
            <span class="brand-tag">WASHDOG</span>
            <span class="save-tag">Guarda este tip</span>
          </div>
        </div>
      </div>`
    }
  },

  park: {
    fields: [
      { id:'name', label:'Nombre del parque', type:'input', default:'Parque Inés de Suárez' },
      { id:'location', label:'Ubicación', type:'input', default:'Providencia / Ñuñoa' },
      { id:'body', label:'Descripción', type:'textarea', default:'Sombra real, zonas de pasto y espacio para correr sin correa. Ideal para un paseo de fin de semana.' },
      { id:'chips', label:'Tags (separados por coma)', type:'input', default:'Perros sin correa,Sombra,Bebederos' },
    ],
    render(f, imgs) {
      const chipsHtml = (f.chips||'').split(',').map(c=>`<span class="chip">${c.trim()}</span>`).join('')
      const imgHtml = imgs.park_photo
        ? `<img src="${imgs.park_photo}" alt="park">`
        : `<div class="drop-hint">📸 Arrastra una foto aquí<br><span style="font-size:9px;opacity:0.7">o haz clic para seleccionar</span></div>`
      return `<div class="post park">
        <div class="photo-area drop-zone" id="zone-park_photo">
          <div class="photo-badge">Parque dog-friendly</div>
          ${imgHtml}
        </div>
        <div class="content">
          <h2>${f.name||'Parque'}</h2>
          <div class="meta">${f.location||''}</div>
          <p class="body-text">${(f.body||'').replace(/\n/g,'<br>')}</p>
          <div class="chips">${chipsHtml}</div>
          <div class="footer">
            <span class="brand-tag">WASHDOG</span>
            <span class="cta-small">washdog.cl/newsletter</span>
          </div>
        </div>
      </div>`
    }
  },

  client: {
    fields: [
      { id:'dog_name', label:'Nombre del perro', type:'input', default:'Luna' },
      { id:'dog_meta', label:'Raza · Edad · Comuna', type:'input', default:'Golden Retriever · 3 años · Ñuñoa' },
      { id:'quote', label:'Testimonio', type:'textarea', default:'Llegó llena de barro y salió impecable y feliz. El equipo fue increíble con ella.' },
      { id:'highlight', label:'Frase destacada', type:'input', default:'impecable y feliz' },
    ],
    render(f, imgs) {
      const hl = f.highlight||''
      const quote = (f.quote||'').replace(hl, `<strong>${hl}</strong>`)
      const imgHtml = imgs.client_photo
        ? `<img src="${imgs.client_photo}" alt="dog">`
        : `<div class="drop-hint" style="font-size:9px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.06em;line-height:1.5;">📸 Foto del perro<br>arrastra aquí</div>`
      return `<div class="post client">
        <div class="top-grad">
          <div class="top-grad-bg"></div>
          <div class="bubble1"></div><div class="bubble2"></div>
          <div class="photo-ring-wrap">
            <div class="photo-ring">
              <div class="photo-circle drop-zone" id="zone-client_photo">
                ${imgHtml}
              </div>
            </div>
          </div>
        </div>
        <div class="content">
          <div class="dog-name">${f.dog_name||'Perro'}</div>
          <div class="dog-meta">${f.dog_meta||''}</div>
          <div class="stars">★★★★★</div>
          <p class="quote">"${quote}"</p>
        </div>
        <div class="footer">
          <span class="brand-tag">WASHDOG</span>
          <span class="ig">@washdogexpress</span>
        </div>
      </div>`
    }
  },

  service: {
    fields: [
      { id:'headline', label:'Titular', type:'input', default:'Autolavado en 3 pasos' },
      { id:'highlight', label:'Palabras en amarillo', type:'input', default:'3 pasos' },
      { id:'step1', label:'Paso 1', type:'input', default:'Elige tu cabina y prepara a tu perro' },
      { id:'step1sub', label:'Paso 1 — detalle', type:'input', default:'Rampa antideslizante y amarre de seguridad incluidos' },
      { id:'step2', label:'Paso 2', type:'input', default:'Shampoo, acondicionador y secador incluidos' },
      { id:'step2sub', label:'Paso 2 — detalle', type:'input', default:'Productos profesionales sin costo extra' },
      { id:'step3', label:'Paso 3', type:'input', default:'Listo en 30–45 minutos' },
      { id:'step3sub', label:'Paso 3 — detalle', type:'input', default:'Sin cita previa · Sin esperas' },
    ],
    render(f) {
      const hl = f.highlight||''
      const headline = (f.headline||'').replace(hl, `<em>${hl}</em>`)
      return `<div class="post service">
        <svg class="svg-bubbles" viewBox="0 0 540 540">
          <circle cx="480" cy="80" r="100" fill="none" stroke="white" stroke-opacity="0.04" stroke-width="2"/>
          <circle cx="60" cy="450" r="140" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="2"/>
        </svg>
        <div class="top-bar"></div>
        <div class="inner">
          <div class="eyebrow">Cómo funciona</div>
          <h2>${headline}</h2>
          <div class="steps">
            <div class="step"><div class="step-num">1</div><div class="step-text">${f.step1||''}<small>${f.step1sub||''}</small></div></div>
            <div class="step"><div class="step-num">2</div><div class="step-text">${f.step2||''}<small>${f.step2sub||''}</small></div></div>
            <div class="step"><div class="step-num">3</div><div class="step-text">${f.step3||''}<small>${f.step3sub||''}</small></div></div>
          </div>
          <div class="footer">
            <span class="brand-tag">WASHDOG · ÑUÑOA</span>
            <span class="cta-small">washdog.cl</span>
          </div>
        </div>
      </div>`
    }
  }
}

// ── Collect field values ────────────────────────────────────────────────────
function getFieldValues() {
  const vals = {}
  document.querySelectorAll('[data-field]').forEach(el => {
    vals[el.dataset.field] = el.value
  })
  return vals
}

// ── Render post ─────────────────────────────────────────────────────────────
function renderPost() {
  const tmpl = templates[currentTemplate]
  const vals = getFieldValues()
  const wrap = document.getElementById('post-wrap')
  wrap.innerHTML = tmpl.render(vals, images)
  attachDropZones()
}

// ── Drop zones ──────────────────────────────────────────────────────────────
function attachDropZones() {
  document.querySelectorAll('.drop-zone').forEach(zone => {
    const zoneId = zone.id.replace('zone-', '')

    // Drag over
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragging') })
    zone.addEventListener('dragleave', () => zone.classList.remove('dragging'))
    zone.addEventListener('drop', e => {
      e.preventDefault()
      zone.classList.remove('dragging')
      const file = e.dataTransfer.files[0]
      if (file && file.type.startsWith('image/')) loadImage(file, zoneId)
    })
    // Click to select
    zone.addEventListener('click', () => {
      const input = document.createElement('input')
      input.type = 'file'; input.accept = 'image/*'
      input.onchange = e => {
        if (e.target.files[0]) loadImage(e.target.files[0], zoneId)
      }
      input.click()
    })
  })
}

function loadImage(file, zoneId) {
  const reader = new FileReader()
  reader.onload = e => {
    images[zoneId] = e.target.result
    renderPost()
  }
  reader.readAsDataURL(file)
}

// ── Set template ────────────────────────────────────────────────────────────
function setTemplate(name) {
  currentTemplate = name
  images = {}
  document.querySelectorAll('.tmpl-btn').forEach(b => b.classList.remove('active'))
  event.currentTarget.classList.add('active')

  const container = document.getElementById('fields-container')
  const tmpl = templates[name]
  container.innerHTML = tmpl.fields.map(f => `
    <div class="field">
      <label>${f.label}</label>
      ${f.type === 'textarea'
        ? `<textarea data-field="${f.id}" oninput="renderPost()">${f.default||''}</textarea>`
        : `<input type="text" data-field="${f.id}" value="${f.default||''}" oninput="renderPost()">`
      }
    </div>
  `).join('')

  renderPost()
}

// ── Export ──────────────────────────────────────────────────────────────────
async function exportPost() {
  const overlay = document.getElementById('export-overlay')
  overlay.classList.add('show')

  await new Promise(r => setTimeout(r, 100))

  const el = document.querySelector('.post')
  const canvas = await html2canvas(el, {
    scale: 2,              // 2× → 1080px on 540px element
    useCORS: true,
    allowTaint: true,
    backgroundColor: null,
    logging: false,
  })

  const link = document.createElement('a')
  link.download = `washdog-${currentTemplate}-${Date.now()}.png`
  link.href = canvas.toDataURL('image/png')
  link.click()

  overlay.classList.remove('show')
}

// ── Init ────────────────────────────────────────────────────────────────────
setTemplate('tip')
</script>
